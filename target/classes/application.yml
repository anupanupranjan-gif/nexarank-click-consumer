spring:
  application:
    name: nexarank-click-consumer
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:searchx-kafka-dual-role-0.searchx-kafka-kafka-brokers.kafka.svc.cluster.local:9092}

nexarank:
  store: postgresql
  kafka:
    topic: search-clicks
    group-id: click-consumer-group
  api:
    base-url: ${NEXARANK_API_URL:http://nexarank-api.default.svc.cluster.local/api/v1}
    tenant-id: ${NEXARANK_TENANT_ID:default}
    project-id: ${NEXARANK_PROJECT_ID:main}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nexarank: INFO
    org.springframework.kafka: WARN
